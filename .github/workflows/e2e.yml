name: E2E (skill loaders)

# Verifies each supported host agent can parse our installed SKILL.md and
# that the `inderes` binary is callable through its runtime. No network, no
# OAuth, no LLM — just skill-parse + subprocess-spawn shape checks.
#
# Gated on changes that can break host integration, plus a weekly cron to
# catch upstream format drift.

on:
  push:
    branches: [main]
    paths:
      - "src/skill/**"
      - "src/skill.rs"
      - "src/commands.rs"
      - "src/main.rs"
      - "tests/e2e/**"
      - ".github/workflows/e2e.yml"
  pull_request:
    paths:
      - "src/skill/**"
      - "src/skill.rs"
      - "src/commands.rs"
      - "src/main.rs"
      - "tests/e2e/**"
      - ".github/workflows/e2e.yml"
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC
  workflow_dispatch:

env:
  # Third-party hosts are pinned to specific SHAs — bump deliberately.
  # ptrclaw is deliberately unpinned (own repo, always test latest main).
  OPENCLAW_SHA: 8f64cd3e4d8339a6aab3ca230d5e14944c91cfaf
  HERMES_SHA: 62c14d5513469e27474fc9535fcdd4afa016646f
  CARGO_TERM_COLOR: always

jobs:
  build-inderes:
    name: Build inderes binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: e2e-inderes

      - name: Build release binary
        run: cargo build --release

      - name: Upload binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: inderes-linux
          path: target/release/inderes
          retention-days: 1
          if-no-files-found: error

  openclaw:
    name: OpenClaw skill loader
    needs: build-inderes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout inderes-cli
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkout openclaw at pinned SHA
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: openclaw/openclaw
          ref: ${{ env.OPENCLAW_SHA }}
          path: .host/openclaw

      - name: Download inderes binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: inderes-linux
          path: .bin
      - run: chmod +x .bin/inderes

      - name: Set up Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: "10"
          run_install: false

      - name: Install OpenClaw root deps
        working-directory: .host/openclaw
        run: pnpm install --filter . --prefer-offline --ignore-scripts

      - name: Install validator deps
        working-directory: tests/e2e/openclaw
        run: npm install --no-audit --no-fund

      - name: Run OpenClaw validator
        working-directory: tests/e2e/openclaw
        env:
          OPENCLAW_DIR: ${{ github.workspace }}/.host/openclaw
          INDERES_BIN: ${{ github.workspace }}/.bin/inderes
        run: ./node_modules/.bin/tsx validate.mts

  hermes:
    name: Hermes skill loader
    needs: build-inderes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout inderes-cli
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkout hermes-agent at pinned SHA
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: NousResearch/hermes-agent
          ref: ${{ env.HERMES_SHA }}
          path: .host/hermes

      - name: Download inderes binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: inderes-linux
          path: .bin
      - run: chmod +x .bin/inderes

      - name: Set up Python 3.11
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install Hermes (minimal)
        working-directory: .host/hermes
        # Base install is enough — we only need agent.* and tools.* modules.
        # No [all] extras (voice, modal, etc.) because we don't exercise them.
        run: pip install -e .

      - name: Run Hermes validator
        env:
          HERMES_DIR: ${{ github.workspace }}/.host/hermes
          INDERES_BIN: ${{ github.workspace }}/.bin/inderes
        run: python3 tests/e2e/hermes/validate.py

  ptrclaw:
    name: ptrclaw skill loader
    needs: build-inderes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout inderes-cli
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # ptrclaw lives in the user's own repo and is deliberately not pinned.
      # We always test against the latest main of heikki-laitala/ptrclaw.
      - name: Checkout ptrclaw at main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: heikki-laitala/ptrclaw
          ref: main
          path: .host/ptrclaw

      - name: Download inderes binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: inderes-linux
          path: .bin
      - run: chmod +x .bin/inderes

      - name: Build ptrclaw validator
        env:
          PTRCLAW_DIR: ${{ github.workspace }}/.host/ptrclaw
        run: tests/e2e/ptrclaw/build.sh

      - name: Run ptrclaw validator
        env:
          INDERES_BIN: ${{ github.workspace }}/.bin/inderes
        run: tests/e2e/ptrclaw/validate
